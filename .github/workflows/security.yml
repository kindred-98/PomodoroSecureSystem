name: Security Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Security Scan
        run: bandit -r src -f txt -o bandit_report.txt -x tests,.venv,venv || true

      - name: Display Bandit Results
        run: |
          if [ -f bandit_report.txt ]; then
            cat bandit_report.txt
          else
            echo "No issues found"
          fi

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit_report.txt
          retention-days: 30

      - name: Fail on high/medium issues
        run: |
          # Extraer solo números de las líneas de severidad
          HIGH=$(grep -E "^\s+High:" bandit_report.txt | grep -oE "[0-9]+" | head -1)
          MEDIUM=$(grep -E "^\s+Medium:" bandit_report.txt | grep -oE "[0-9]+" | head -1)
          
          # Si no se encuentran, asumir 0
          HIGH=${HIGH:-0}
          MEDIUM=${MEDIUM:-0}
          
          echo "High: $HIGH, Medium: $MEDIUM"
          
          # Solo falla en High o Medium (Low se ignora)
          if [ "$HIGH" -gt 0 ] || [ "$MEDIUM" -gt 0 ]; then
            echo "Security issues found! High: $HIGH, Medium: $MEDIUM"
            exit 1
          else
            echo "No high/medium security issues found (Low issues OK)"
          fi

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install safety
        run: pip install safety

      - name: Check dependencies
        run: safety check --json --output safety_report.json || true

      - name: Upload Safety Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: safety_report.json
          retention-days: 30
